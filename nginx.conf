server {
    # Set the root to where your HTML/PHP files are
    root /home/site/wwwroot;
    index index.php index.html index.htm;

    # 1. WEB PORTAL: Handle the main website and sub-pages
    location / {
        # This tells Nginx: Look for the file, then the folder, then fallback to index.php
        try_files $uri $uri/ /index.php$is_args$args;
    }

    # 2. MOBILE API: Handle everything inside the /api/ folder
    location /api/ {
        # Look for the file inside the api folder
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            
            # This mapping is critical for subfolders
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Fixes the "Credentials Required" for Mobile
            fastcgi_param REQUEST_METHOD  $request_method;
            fastcgi_param CONTENT_TYPE    $content_type;
            fastcgi_param CONTENT_LENGTH  $content_length;
        }
    }

    # 3. GENERAL PHP: Handle root PHP files like contact.php or appointments.php
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }
}