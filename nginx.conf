# 1. Specific block for your OralSync Mobile API
location /api/ {
    # Check if the file exists, otherwise 404
    try_files $uri $uri/ =404;
    
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        
        # Crucial for mobile POST requests - MUST be inside the .php block
        fastcgi_param REQUEST_METHOD  $request_method;
        fastcgi_param CONTENT_TYPE    $content_type;
        fastcgi_param CONTENT_LENGTH  $content_length;
    }
}

# 2. General block for all other .php files (Web Portal)
location ~ [^/]\.php(/|$) {
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
}

# 3. Static files and main landing pages
location / {
    index index.php index.html index.htm;
    try_files $uri $uri/ /index.php$is_args$args;
}