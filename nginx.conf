server {
    listen 80;
    root /home/site/wwwroot;
    index index.php index.html;

    # 1. TENANT WEB PORTAL ROUTES
    location ~ ^/tenant/([^/]+)/login/?$ {
        rewrite ^/tenant/([^/]+)/login/?$ /tenant_login.php?tenant=$1 last;
    }

    location ~ ^/tenant/([^/]+)/dashboard/?$ {
        rewrite ^/tenant/([^/]+)/dashboard/?$ /tenant_dashboard.php?tenant=$1 last;
    }

    # 2. MOBILE API FOLDER
    # This specifically handles your partner's request to /api/patient_login.php
    location /api/ {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass unix:/var/run/php/php-fpm.sock;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Ensure POST data (identifier/password) reaches PHP
            fastcgi_param REQUEST_METHOD  $request_method;
            fastcgi_param CONTENT_TYPE    $content_type;
            fastcgi_param CONTENT_LENGTH  $content_length;
        }
    }

    # 3. ROOT PHP FILES (e.g., patient_login.php or tenant_login.php)
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass unix:/var/run/php/php-fpm.sock;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 4. GENERAL FALLBACK
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}