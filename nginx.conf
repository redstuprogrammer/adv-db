server {
    listen 80;
    root /home/site/wwwroot;
    index index.php index.html;

    # 1. TENANT WEB PORTAL ROUTES
    location ~ ^/tenant/([^/]+)/login/?$ {
        rewrite ^/tenant/([^/]+)/login/?$ /tenant_login.php?tenant=$1 last;
    }

    location ~ ^/tenant/([^/]+)/dashboard/?$ {
        rewrite ^/tenant/([^/]+)/dashboard/?$ /tenant_dashboard.php?tenant=$1 last;
    }

    # 2. MOBILE API FOLDER
    location /api/ {
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000; # <--- Changed back to IP
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Critical for Mobile POST requests
            fastcgi_param REQUEST_METHOD  $request_method;
            fastcgi_param CONTENT_TYPE    $content_type;
            fastcgi_param CONTENT_LENGTH  $content_length;
        }
    }

    # 3. ROOT PHP FILES
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000; # <--- Changed back to IP
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 4. GENERAL FALLBACK
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}