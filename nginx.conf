server {
    listen 80;
    root /home/site/wwwroot; # Standard Azure App Service path
    index index.php index.html;

    # 1. MOBILE LOGIN FIX
    # The mobile app hits /mobile_login.php, but the server file is /patient_login.php
    location = /mobile_login.php {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        # Force Nginx to look for the patient_login.php file instead
        fastcgi_param SCRIPT_FILENAME $document_root/patient_login.php;
    }

    # 2. TENANT LOGIN ROUTES (The "Friendly" URLs)
    # Route: /tenant/{slug}/login -> tenant_login.php?tenant={slug}
    location ~ ^/tenant/([^/]+)/login/?$ {
        rewrite ^/tenant/([^/]+)/login/?$ /tenant_login.php?tenant=$1 last;
    }

    # Route: /tenant/{slug}/dashboard -> tenant_dashboard.php?tenant={slug}
    location ~ ^/tenant/([^/]+)/dashboard/?$ {
        rewrite ^/tenant/([^/]+)/dashboard/?$ /tenant_dashboard.php?tenant=$1 last;
    }

    # 3. API FOLDER (If your mobile app uses /api/ later)
    location /api/ {
        try_files $uri $uri/ /api/index.php?$args;
        
        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        }
    }

    # 4. GENERAL PHP PROCESSING
    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # 5. FALLBACK
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}