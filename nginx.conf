server {
    listen 80;
    root /home/site/wwwroot;
    index index.php index.html;

    # 1. TENANT LOGIN ROUTES (Web Portal)
    location ~ ^/tenant/([^/]+)/login/?$ {
        rewrite ^/tenant/([^/]+)/login/?$ /tenant_login.php?tenant=$1 last;
    }

    location ~ ^/tenant/([^/]+)/dashboard/?$ {
        rewrite ^/tenant/([^/]+)/dashboard/?$ /tenant_dashboard.php?tenant=$1 last;
    }

    # 2. MOBILE API FIX
    # This block handles everything inside the /api/ folder
    location /api/ {
        # If the file exists (like patient_login.php), serve it. 
        # If not, don't throw a 404 immediately, try to process it.
        try_files $uri $uri/ =404;

        location ~ \.php$ {
            include fastcgi_params;
            fastcgi_pass 127.0.0.1:9000;
            # This ensures Nginx looks inside /home/site/wwwroot/api/
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            
            # Important for the Mobile POST requests
            fastcgi_param REQUEST_METHOD  $request_method;
            fastcgi_param CONTENT_TYPE    $content_type;
            fastcgi_param CONTENT_LENGTH  $content_length;
        }
    }

    # 3. GENERAL PHP PROCESSING (For files in root like tenant_login.php)
    location ~ [^/]\.php(/|$) {
        fastcgi_split_path_info ^(.+?\.php)(/.*)$;
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
    }

    # 4. FALLBACK
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }
}