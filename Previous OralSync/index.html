<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OralSync Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo">
            <img src="oral logo.png" alt="OralSync">
            <span>OralSync</span>
        </div>

        <nav class="menu">
            <a class="active" href="#">Dashboard</a>
            <a href="#">Appointment</a>
            <a href="#">Patient</a>
            <a href="#">Dentist</a>
            <a href="#">Report</a>
        </nav>

        <div class="logout">
            <a href="#">Sign Out</a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main">

        <!-- TOP BAR -->
        <header class="topbar">
            <span class="time">12:00 PM</span>
            <span class="user">Admin</span>
        </header>

        <!-- DASHBOARD -->
        <section class="dashboard">
            <h2>DASHBOARD OVERVIEW</h2>

            <div class="cards">
                <div class="card">
                    <h3>Appointments</h3>
                </div>
                <div class="card">
                    <h3>Patients</h3>
                </div>
                <div class="card">
                    <h3>Active Patients</h3>
                </div>
            </div>

            <div class="chart">
                <p>Appointments Overview</p>
                <img src="chart-placeholder.png" alt="Chart">
            </div>

        </section>

    </main>

</div>

</body>
</html>
