# Route: /tenant/{slug}/login -> tenant_login.php?tenant={slug}
location ~ ^/tenant/([^/]+)/login/?$ {
    rewrite ^/tenant/([^/]+)/login/?$ /tenant_login.php?tenant=$1 last;
}

# Route: /tenant/{slug}/dashboard -> tenant_dashboard.php?tenant={slug}
location ~ ^/tenant/([^/]+)/dashboard/?$ {
    rewrite ^/tenant/([^/]+)/dashboard/?$ /tenant_dashboard.php?tenant=$1 last;
}

# This block ensures ALL .php files, regardless of the folder, 
# are sent to the PHP processor for ALL request methods (GET, POST, etc.)
location ~ [^/]\.php(/|$) {
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_pass 127.0.0.1:9000;
    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
    fastcgi_param PATH_INFO $fastcgi_path_info;
}

location / {
    index index.php index.html index.htm;
    try_files $uri $uri/ /index.php$is_args$args;
}